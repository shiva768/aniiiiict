query WorkSeriesList($workId: ID!) {
  node(id: $workId) {
    ... on Work {
      seriesList(first: 5) {
        nodes {
          id
          name
          # NOTE: Annict の Series.works は nodes で辿ると HTTP 500 になるため、
          # edges { item } 経由で取得する必要がある。
          works(first: 30, orderBy: { field: SEASON, direction: ASC }) {
            edges {
              item {
                id
                title
                seasonName
                seasonYear
                image {
                  recommendedImageUrl
                }
              }
            }
          }
        }
      }
    }
  }
}
