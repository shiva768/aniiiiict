query LibraryEntryNode($id: ID!) {
  node(id: $id) {
    ... on LibraryEntry {
      id
      work {
        id
        title
        seasonName
        seasonYear
        media
        malAnimeId
        viewerStatusState
        episodesCount
        noEpisodes
        image {
          recommendedImageUrl
          facebookOgImageUrl
        }
        episodes(first: 1, orderBy: { field: SORT_NUMBER, direction: ASC }) {
          nodes {
            id
            number
            numberText
            title
          }
        }
      }
      nextEpisode {
        id
        number
        numberText
        title
      }
      status {
        state
      }
    }
  }
}
