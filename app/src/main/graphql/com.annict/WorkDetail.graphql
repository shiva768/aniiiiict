query WorkDetail($workId: ID!) {
  node(id: $workId) {
    ... on Work {
      id
      title
      titleEn
      seasonName
      seasonYear
      media
      malAnimeId
      viewerStatusState
      officialSiteUrl
      officialSiteUrlEn
      wikipediaUrl
      wikipediaUrlEn
      episodesCount
      image {
        recommendedImageUrl
        facebookOgImageUrl
      }
      programs(first: 20) {
        nodes {
          id
          startedAt
          channel {
            id
            name
          }
        }
      }
      casts(first: 30) {
        nodes {
          id
          name
          character {
            id
            name
          }
          person {
            id
            name
          }
        }
      }
}
  }
}